name: CI My Profile Project

on:
  pull_request:
    branches: 
      - main  # แก้ไขตรงนี้: ต้องมีช่องว่างหลังขีดกลางด้วยนะครับ

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # 1. ดึง Code มาจาก Repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ติดตั้ง Node.js (แนะนำวิธีนี้แทนการใช้ container image)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # ช่วยให้การรันครั้งต่อไปเร็วขึ้นมาก

      # 3. ติดตั้ง Dependencies
      - name: Install dependencies
        run: npm install

      # 4. รันคำสั่ง Test หรือ Build
      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build